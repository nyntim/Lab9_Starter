<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');
    form.addEventListener('submit', e => {
      e.preventDefault();
      let output = document.querySelector('output');
      let firstNum = document.querySelector('#first-num').value;
      let secondNum = document.querySelector('#second-num').value;
      let operator = document.querySelector('#operator').value;
      try {
        // Comment out <output> in the HTML and this throws instead of crashing.
        if (!output) throw new Error('Missing <output> element');
        output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
      } catch (err) {
        // eval() also lands here on bad input (e.g. "3 +" -> SyntaxError).
        console.error(`${err.name}: ${err.message}`);
      } finally {
        console.log('Calculation attempted.');
      }
    });

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish

    // Sample data the demos operate on
    const sampleObj = {
      name: 'Error Calculator',
      version: 9,
      operators: ['+', '-', '*', '/']
    };
    const sampleTable = [
      { lab: 'Lab 7', topic: 'Web Components', done: true },
      { lab: 'Lab 8', topic: 'Promises', done: true },
      { lab: 'Lab 9', topic: 'Console API', done: false }
    ];

    // 0: Console Log — print a simple message
    errorBtns[0].addEventListener('click', () => {
      console.log('Console Log demo: the calculator loaded successfully.');
    });

    // 1: Console Error — print an error-styled message
    errorBtns[1].addEventListener('click', () => {
      console.error('Console Error demo: something went wrong (not really).');
    });

    // 2: Console Count — increment a labeled counter each click
    errorBtns[2].addEventListener('click', () => {
      console.count('Console Count demo');
    });

    // 3: Console Warn — print a warning-styled message
    errorBtns[3].addEventListener('click', () => {
      console.warn('Console Warn demo: this is a warning.');
    });

    // 4: Console Assert — only logs when the condition is false
    errorBtns[4].addEventListener('click', () => {
      console.assert(1 === 2, 'Console Assert demo: 1 does not equal 2.');
    });

    // 5: Console Clear — wipe the console output
    errorBtns[5].addEventListener('click', () => {
      console.clear();
    });

    // 6: Console Dir — show an interactive list of an object's properties
    errorBtns[6].addEventListener('click', () => {
      console.dir(sampleObj);
    });

    // 7: Console dirxml — show an XML/HTML element tree
    errorBtns[7].addEventListener('click', () => {
      console.dirxml(document.querySelector('#error-btns'));
    });

    // 8: Console Group Start — open a collapsible group of messages
    errorBtns[8].addEventListener('click', () => {
      console.group('Console Group demo');
      console.log('This message is inside the group.');
      console.log('So is this one — press "Console Group End" to close it.');
    });

    // 9: Console Group End — close the most recently opened group
    errorBtns[9].addEventListener('click', () => {
      console.log('This message closes the group.');
      console.groupEnd();
    });

    // 10: Console Table — render array/object data as a table
    errorBtns[10].addEventListener('click', () => {
      console.table(sampleTable);
    });

    // 11: Start Timer — begin a named timer
    errorBtns[11].addEventListener('click', () => {
      console.time('Console Timer demo');
    });

    // 12: End Timer — stop the named timer and print elapsed time
    errorBtns[12].addEventListener('click', () => {
      console.timeEnd('Console Timer demo');
    });

    // 13: Console Trace — print the call stack from this point
    errorBtns[13].addEventListener('click', () => {
      console.trace('Console Trace demo');
    });
  </script>
</body>

</html>
